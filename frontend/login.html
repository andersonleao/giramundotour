<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GiraMundoTour - Login">
    <title>GiraMundoTour - Login</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/logomarca.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(66, 153, 225, 0.2) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow:
                0 25px 50px -12px rgba(0, 0, 0, 0.25),
                0 0 0 1px rgba(255, 255, 255, 0.2);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.3; }
        }

        .login-logo {
            max-width: 200px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2));
            position: relative;
            z-index: 1;
        }

        .login-title {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
        }

        .login-subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-top: 5px;
            position: relative;
            z-index: 1;
        }

        .login-body {
            padding: 40px 30px;
        }

        .form-label {
            font-weight: 500;
            color: #4a5568;
            margin-bottom: 8px;
        }

        .input-group {
            position: relative;
        }

        .input-group-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            padding: 12px 16px;
        }

        .form-control {
            border: 2px solid #e2e8f0;
            border-left: none;
            padding: 12px 16px;
            font-size: 1rem;
            border-radius: 0 12px 12px 0 !important;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .input-group-text {
            border-radius: 12px 0 0 12px !important;
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            color: #fff;
            width: 100%;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #718096;
            z-index: 10;
            transition: color 0.3s;
        }

        .password-toggle:hover {
            color: #667eea;
        }

        .alert {
            border-radius: 12px;
            border: none;
            padding: 15px 20px;
        }

        .alert-danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: #fff;
        }

        .alert-success {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: #fff;
        }

        .form-check-input:checked {
            background-color: #667eea;
            border-color: #667eea;
        }

        .login-footer {
            text-align: center;
            padding: 20px 30px 30px;
            color: #718096;
            font-size: 0.85rem;
        }

        .login-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .spinner-border-sm {
            width: 1.2rem;
            height: 1.2rem;
            margin-right: 8px;
        }

        /* Floating animation for decorative elements */
        .floating-shape {
            position: fixed;
            border-radius: 50%;
            opacity: 0.1;
            pointer-events: none;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background: #fff;
            top: -100px;
            right: -100px;
            animation: float 6s ease-in-out infinite;
        }

        .shape-2 {
            width: 200px;
            height: 200px;
            background: #fff;
            bottom: -50px;
            left: -50px;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-header {
                padding: 30px 20px;
            }

            .login-body {
                padding: 30px 20px;
            }

            .login-logo {
                max-width: 150px;
            }

            .login-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <!-- Decorative shapes -->
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="assets/images/logomarca.png" alt="GiraMundoTour" class="login-logo">
                <h1 class="login-title">Bem-vindo!</h1>
                <p class="login-subtitle">Faça login para continuar</p>
            </div>

            <div class="login-body">
                <!-- Alertas -->
                <div id="alertContainer"></div>

                <form id="loginForm" autocomplete="on">
                    <div class="mb-4">
                        <label class="form-label" for="email">
                            <i class="bi bi-envelope me-1"></i> Email
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person"></i>
                            </span>
                            <input type="email" class="form-control" id="email" name="email"
                                   placeholder="seu@email.com" required autocomplete="email">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label" for="senha">
                            <i class="bi bi-lock me-1"></i> Senha
                        </label>
                        <div class="input-group position-relative">
                            <span class="input-group-text">
                                <i class="bi bi-key"></i>
                            </span>
                            <input type="password" class="form-control" id="senha" name="senha"
                                   placeholder="••••••••" required autocomplete="current-password">
                            <span class="password-toggle" onclick="togglePassword()">
                                <i class="bi bi-eye" id="passwordIcon"></i>
                            </span>
                        </div>
                    </div>

                    <div class="mb-4 d-flex justify-content-between align-items-center">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="lembrar">
                            <label class="form-check-label" for="lembrar">
                                Lembrar-me
                            </label>
                        </div>
                        <a href="#" onclick="esqueceuSenha()" class="text-decoration-none" style="color: #667eea; font-size: 0.9rem;">
                            Esqueceu a senha?
                        </a>
                    </div>

                    <button type="submit" class="btn btn-login" id="btnLogin">
                        <i class="bi bi-box-arrow-in-right me-2"></i>
                        Entrar
                    </button>
                </form>
            </div>

            <div class="login-footer">
                <p class="mb-0">
                    <i class="bi bi-shield-check me-1"></i>
                    Área restrita para funcionários
                </p>
            </div>
        </div>

        <div class="text-center mt-4">
            <p style="color: rgba(255,255,255,0.8); font-size: 0.85rem;">
                © 2024 GiraMundoTour. Todos os direitos reservados.
            </p>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Configurações da API
        const API_URL = window.location.origin + '/api';

        // Toggle visibilidade da senha
        function togglePassword() {
            const senhaInput = document.getElementById('senha');
            const icon = document.getElementById('passwordIcon');

            if (senhaInput.type === 'password') {
                senhaInput.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                senhaInput.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        }

        // Mostrar alerta
        function showAlert(message, type = 'danger') {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `
                <div class="alert alert-${type} d-flex align-items-center" role="alert">
                    <i class="bi ${type === 'danger' ? 'bi-exclamation-circle' : 'bi-check-circle'} me-2"></i>
                    <div>${message}</div>
                </div>
            `;

            // Auto-remover após 5 segundos
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        // Esqueceu a senha
        function esqueceuSenha() {
            alert('Entre em contato com o administrador para redefinir sua senha.');
        }

        // Verificar se já está logado
        function checkAuth() {
            const token = localStorage.getItem('giramundo_token');
            if (token) {
                // Verificar se token ainda é válido
                fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                .then(res => {
                    if (res.ok) {
                        window.location.href = 'index.html';
                    } else {
                        localStorage.removeItem('giramundo_token');
                        localStorage.removeItem('giramundo_user');
                    }
                })
                .catch(() => {
                    localStorage.removeItem('giramundo_token');
                    localStorage.removeItem('giramundo_user');
                });
            }
        }

        // Carregar email salvo
        function loadSavedEmail() {
            const savedEmail = localStorage.getItem('giramundo_email');
            if (savedEmail) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('lembrar').checked = true;
            }
        }

        // Submit do formulário
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('btnLogin');
            const originalText = btn.innerHTML;

            // Desabilitar botão e mostrar loading
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Entrando...';

            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const lembrar = document.getElementById('lembrar').checked;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, senha })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Salvar token e dados do usuário
                    localStorage.setItem('giramundo_token', data.data.token);
                    localStorage.setItem('giramundo_user', JSON.stringify(data.data.usuario));

                    // Salvar email se "lembrar-me" estiver marcado
                    if (lembrar) {
                        localStorage.setItem('giramundo_email', email);
                    } else {
                        localStorage.removeItem('giramundo_email');
                    }

                    showAlert('Login realizado com sucesso! Redirecionando...', 'success');

                    // Redirecionar para o sistema
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showAlert(data.message || 'Email ou senha incorretos');
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            } catch (error) {
                console.error('Erro no login:', error);
                showAlert('Erro ao conectar com o servidor. Verifique sua conexão.');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadSavedEmail();

            // Focus no campo email
            document.getElementById('email').focus();
        });

        // Enter para submeter
        document.getElementById('senha').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
