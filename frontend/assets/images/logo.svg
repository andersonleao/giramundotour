<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2b6cb0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="60" rx="8" fill="url(#bgGradient)"/>

  <!-- Globe Icon -->
  <g transform="translate(15, 10)">
    <!-- Globe circle -->
    <circle cx="20" cy="20" r="18" fill="none" stroke="#4299e1" stroke-width="2"/>

    <!-- Latitude lines -->
    <ellipse cx="20" cy="20" rx="18" ry="7" fill="none" stroke="#4299e1" stroke-width="1"/>
    <ellipse cx="20" cy="20" rx="18" ry="14" fill="none" stroke="#4299e1" stroke-width="1"/>

    <!-- Longitude lines -->
    <ellipse cx="20" cy="20" rx="7" ry="18" fill="none" stroke="#4299e1" stroke-width="1"/>

    <!-- Airplane -->
    <path d="M12 18 L28 22 L30 20 L16 16 L12 18 Z" fill="#fff"/>
    <path d="M18 21 L22 28 L24 27 L21 21 Z" fill="#fff"/>
    <circle cx="14" cy="17" r="2" fill="#4299e1"/>
  </g>

  <!-- Text: GiraMundo -->
  <text x="60" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff">
    GiraMundo
  </text>

  <!-- Text: Tour -->
  <text x="60" y="46" font-family="Arial, sans-serif" font-size="16" font-weight="normal" fill="#4299e1">
    Tour
  </text>

  <!-- Tagline -->
  <text x="125" y="46" font-family="Arial, sans-serif" font-size="8" fill="#a0aec0">
    Sua viagem começa aqui
  </text>
</svg>
